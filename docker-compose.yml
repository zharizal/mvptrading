services:
  backend:
    build: ./backend
    container_name: mvptrading-backend
    restart: unless-stopped
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      SYMBOL: ${SYMBOL:-BTCUSDT}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_REFERER: ${OPENROUTER_REFERER:-}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-mvptrading}
      LLM_MODEL: ${LLM_MODEL:-anthropic/claude-haiku-4.5}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-5}
      POLL_INTERVAL_FOREX_SECONDS: ${POLL_INTERVAL_FOREX_SECONDS:-30}
      TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY:-}
      DB_PATH: ${DB_PATH:-data/mvptrading.db}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws/market}
    container_name: mvptrading-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws/market}
    ports:
      - "3000:3000"
    depends_on:
      - backend
